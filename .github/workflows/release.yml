name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: routis-linux-x86_64
            binary: routis
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: routis-windows-x86_64.exe
            binary: routis.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: routis-macos-x86_64
            binary: routis
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
      - name: Package Windows
        if: runner.os == 'Windows'
        run: Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
