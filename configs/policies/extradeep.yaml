name: extradeep
description: Extra-deep preset for redesigns, core failures, and deeply uncertain work.

execution:
  model: gpt-5.4
  reasoning: xhigh

behavior:
  mode: fixed
  baseline_profile: extradeep
  default_route: extradeep

signals:
  cheap:
    - typo
    - rename
    - format
    - wording
    - comment cleanup
    - explain snippet
    - quick summary
    - tiny fix
    - small edit
  balanced:
    - implement
    - refactor
    - add feature
    - write tests
    - improve
    - update
    - review
    - extend
    - add flag
    - load config
    - adjust validation
    - improve cli
  deep:
    - debug
    - root cause
    - architecture
    - migration
    - security
    - cross-file
    - investigate
    - concurrency
    - edge case
    - flaky behavior
    - production issue
    - uncertainty
  extradeep:
    - redesign routing
    - major architecture change
    - policy/schema redesign
    - hard multi-file debugging
    - unclear core failure
    - large refactor across layers
    - deeply uncertain system behavior

cues:
  upgrade:
    - across files
    - migration
    - production
    - root cause
    - security
    - uncertain
    - intermittent
    - redesign
    - architecture
    - multiple modules
  downgrade:
    - small
    - minor
    - quick
    - simple
    - just
    - tiny

output:
  lean_output: false
  silent_success: false
  patch_first: true
